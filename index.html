<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AI Literacy Quest</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#07070f;color:#f0eeff;min-height:100vh;overflow-x:hidden}
:root{--accent:#7c5cfc;--accent2:#ff6b9d;--accent3:#00e5c0;--card:#111120;--card2:#181830;--text:#f0eeff;--muted:#7a78a0;--border:#22223a}
.app{min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:1.5rem 1rem 3rem}
h1,h2,h3{font-family:'Syne',sans-serif}
.particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.particle{position:absolute;border-radius:50%;opacity:.13;animation:pfloat linear infinite}
@keyframes pfloat{0%{transform:translateY(100vh) rotate(0deg);opacity:0}10%{opacity:.13}90%{opacity:.13}100%{transform:translateY(-120px) rotate(720deg);opacity:0}}
.screen{position:relative;z-index:1;width:100%;max-width:680px;animation:fadeUp .4s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--card);border:1px solid var(--border);border-radius:22px;padding:2.2rem 2rem;position:relative;overflow:hidden}
.card-glow::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% -10%,rgba(124,92,252,.13) 0%,transparent 65%);pointer-events:none;z-index:0}
.card>*{position:relative;z-index:1}
/* SPLASH */
.logo-wrap{display:flex;justify-content:center;margin-bottom:1.3rem}
.logo-ring{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#7c5cfc,#ff6b9d);display:flex;align-items:center;justify-content:center;font-size:2.1rem;box-shadow:0 0 44px rgba(124,92,252,.4)}
.splash-title{font-size:clamp(1.9rem,5vw,2.7rem);font-weight:800;background:linear-gradient(90deg,#7c5cfc,#ff6b9d,#00e5c0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.1;margin-bottom:.4rem;text-align:center}
.splash-sub{color:var(--muted);font-size:.93rem;text-align:center;margin-bottom:1.5rem;line-height:1.65}
.form-label{font-size:.75rem;font-weight:700;font-family:'Syne',sans-serif;color:var(--muted);text-transform:uppercase;letter-spacing:.09em;margin-bottom:.4rem;display:block}
.name-input{width:100%;padding:.82rem 1.1rem;background:#0b0b1a;border:1.5px solid var(--border);border-radius:11px;color:var(--text);font-size:.96rem;font-family:'DM Sans',sans-serif;transition:border-color .2s,box-shadow .2s;outline:none}
.name-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,92,252,.18)}
.name-input.shake{animation:shake .38s ease}
.name-input.err{border-color:#ff6b9d;box-shadow:0 0 0 3px rgba(255,107,157,.13)}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
.err-msg{font-size:.78rem;color:#ff6b9d;margin-top:.38rem;min-height:1.1rem}
.setup-sec{margin-top:1.2rem}
.chips{display:flex;gap:.45rem;flex-wrap:wrap;margin-top:.45rem}
.chip{padding:.48rem .95rem;border-radius:100px;font-size:.82rem;font-weight:600;font-family:'Syne',sans-serif;border:1.5px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .16s}
.chip:hover{border-color:var(--accent);color:#c4b5fd;background:rgba(124,92,252,.07)}
.chip.ca{border-color:var(--accent);background:rgba(124,92,252,.16);color:#d4c5ff}
.chip.ct{border-color:var(--accent3);background:rgba(0,229,192,.1);color:#00e5c0}
.btn-primary{width:100%;padding:.92rem;background:linear-gradient(90deg,#7c5cfc,#c05cbc);border:none;border-radius:12px;color:#fff;font-size:.98rem;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer;transition:transform .15s,box-shadow .2s;letter-spacing:.04em;margin-top:1.3rem}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(124,92,252,.35)}
.btn-primary:active{transform:translateY(0)}
.badges-row{display:flex;gap:.4rem;justify-content:center;flex-wrap:wrap;margin-bottom:1.3rem}
.bdg{padding:.3rem .8rem;border-radius:100px;font-size:.74rem;font-weight:600;border:1px solid}
.bdg-b{background:rgba(0,229,192,.08);color:#00e5c0;border-color:rgba(0,229,192,.28)}
.bdg-i{background:rgba(124,92,252,.09);color:#a78bfa;border-color:rgba(124,92,252,.28)}
.bdg-a{background:rgba(255,107,157,.08);color:#ff6b9d;border-color:rgba(255,107,157,.28)}
.bdg-m{background:rgba(255,209,102,.08);color:#ffd166;border-color:rgba(255,209,102,.28)}
/* QUIZ TOPBAR */
.quiz-topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:.55rem;gap:.5rem;flex-wrap:wrap}
.q-counter{font-size:.81rem;font-weight:700;font-family:'Syne',sans-serif;color:var(--muted)}
.topbar-right{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap}
.diff-pill{font-size:.71rem;padding:.26rem .7rem;border-radius:100px;font-weight:600}
.dp-b{background:rgba(0,229,192,.1);color:#00e5c0;border:1px solid rgba(0,229,192,.3)}
.dp-i{background:rgba(124,92,252,.1);color:#a78bfa;border:1px solid rgba(124,92,252,.3)}
.dp-a{background:rgba(255,107,157,.1);color:#ff6b9d;border:1px solid rgba(255,107,157,.3)}
.dp-m{background:rgba(255,209,102,.1);color:#ffd166;border:1px solid rgba(255,209,102,.3)}
/* STREAK */
.streak-badge{display:flex;align-items:center;gap:.3rem;padding:.26rem .7rem;border-radius:100px;font-size:.75rem;font-weight:700;font-family:'Syne',sans-serif;background:rgba(255,209,102,.12);color:#ffd166;border:1px solid rgba(255,209,102,.3);transition:all .2s}
.streak-badge.hot{background:rgba(255,107,57,.15);color:#ff6b3d;border-color:rgba(255,107,57,.4);animation:streakPulse .4s ease}
@keyframes streakPulse{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
.streak-flame{font-size:.85rem}
/* COUNTDOWN */
.countdown-wrap{margin-bottom:.8rem}
.countdown-bar-bg{background:var(--card2);border-radius:100px;height:7px;overflow:hidden;position:relative}
.countdown-bar-fill{height:100%;border-radius:100px;transition:width 1s linear,background .5s}
.countdown-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:.3rem}
.countdown-num{font-size:.8rem;font-weight:700;font-family:'Syne',sans-serif;transition:color .3s}
.countdown-urgent{animation:urgentPulse .5s ease infinite}
@keyframes urgentPulse{0%,100%{opacity:1}50%{opacity:.5}}
/* HINT */
.hint-btn{padding:.45rem .9rem;border-radius:9px;font-size:.78rem;font-weight:700;font-family:'Syne',sans-serif;border:1px solid;cursor:pointer;transition:all .16s;display:flex;align-items:center;gap:.35rem}
.hint-btn.available{background:rgba(0,229,192,.08);color:#00e5c0;border-color:rgba(0,229,192,.3)}
.hint-btn.available:hover{background:rgba(0,229,192,.18)}
.hint-btn.used{background:rgba(122,120,160,.06);color:var(--muted);border-color:var(--border);cursor:not-allowed;opacity:.5}
/* PROGRESS */
.prog-bar{background:var(--card2);border-radius:100px;height:4px;overflow:hidden;margin-bottom:1rem}
.prog-fill{height:100%;background:linear-gradient(90deg,#7c5cfc,#ff6b9d);border-radius:100px;transition:width .4s ease}
/* QUESTION */
.q-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:1.7rem 1.5rem;margin-bottom:.85rem;transition:border-color .3s}
.q-card.timeout{border-color:rgba(255,107,157,.4);animation:shakeCard .4s ease}
@keyframes shakeCard{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.q-cat{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.55rem}
.q-text{font-size:1.04rem;line-height:1.65;font-family:'Syne',sans-serif;font-weight:600}
.opts-list{display:flex;flex-direction:column;gap:.5rem;margin-top:1.2rem}
.opt-btn{padding:.82rem 1.05rem;background:#0b0b1a;border:1.5px solid var(--border);border-radius:11px;color:var(--text);font-size:.91rem;text-align:left;cursor:pointer;transition:all .16s;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:.65rem;width:100%}
.opt-btn:hover:not(.chosen):not(.eliminated){background:rgba(124,92,252,.07);border-color:rgba(124,92,252,.45)}
.opt-btn.chosen{background:rgba(124,92,252,.13);border-color:var(--accent);color:#d4c5ff}
.opt-btn.eliminated{background:rgba(122,120,160,.05);border-color:rgba(122,120,160,.15);color:var(--muted);cursor:not-allowed;opacity:.4;text-decoration:line-through}
.opt-letter{width:26px;height:26px;border-radius:7px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:.76rem;font-weight:700;font-family:'Syne',sans-serif;flex-shrink:0;transition:all .16s}
.opt-btn.chosen .opt-letter{background:var(--accent);color:#fff}
.opt-btn.rev-correct{background:rgba(0,229,192,.1);border-color:#00e5c0;color:#00e5c0;cursor:default}
.opt-btn.rev-wrong{background:rgba(255,107,157,.07);border-color:rgba(255,107,157,.4);color:#ff8fab;cursor:default}
.opt-btn.rev-correct .opt-letter{background:#00e5c0;color:#07070f}
.opt-btn.rev-wrong .opt-letter{background:rgba(255,107,157,.45);color:#fff}
/* FEEDBACK TOAST */
.feedback-toast{position:fixed;top:1.2rem;left:50%;transform:translateX(-50%);z-index:200;padding:.6rem 1.4rem;border-radius:100px;font-size:.88rem;font-weight:700;font-family:'Syne',sans-serif;animation:toastIn .3s ease,toastOut .3s ease 1.2s forwards;white-space:nowrap;pointer-events:none}
.toast-correct{background:rgba(0,229,192,.18);color:#00e5c0;border:1px solid rgba(0,229,192,.4)}
.toast-wrong{background:rgba(255,107,157,.15);color:#ff8fab;border:1px solid rgba(255,107,157,.35)}
.toast-timeout{background:rgba(255,160,50,.13);color:#ffb347;border:1px solid rgba(255,160,50,.3)}
.toast-streak{background:rgba(255,209,102,.15);color:#ffd166;border:1px solid rgba(255,209,102,.4)}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateX(-50%) translateY(-8px)}}
/* NAV */
.nav-row{display:flex;gap:.55rem;align-items:center;margin-top:.55rem;flex-wrap:wrap}
.btn-nav{padding:.58rem 1.05rem;background:rgba(124,92,252,.09);border:1px solid rgba(124,92,252,.28);border-radius:9px;color:#c4b5fd;font-size:.83rem;font-family:'Syne',sans-serif;font-weight:600;cursor:pointer;transition:all .16s}
.btn-nav:hover{background:rgba(124,92,252,.18)}
.btn-nav:disabled{opacity:.25;cursor:not-allowed}
.btn-finish{padding:.68rem 1.5rem;background:linear-gradient(90deg,#ff6b9d,#7c5cfc);border:none;border-radius:10px;color:#fff;font-size:.88rem;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer;transition:all .16s}
.btn-finish:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(255,107,157,.3)}
.btn-quit{padding:.58rem 1.05rem;background:rgba(255,107,157,.07);border:1px solid rgba(255,107,157,.22);border-radius:9px;color:#ff8fab;font-size:.83rem;font-family:'Syne',sans-serif;font-weight:600;cursor:pointer;transition:all .16s;margin-left:auto}
.btn-quit:hover{background:rgba(255,107,157,.15);border-color:rgba(255,107,157,.4)}
/* DOT GRID */
.dot-grid{display:flex;gap:.32rem;flex-wrap:wrap;margin-top:.82rem}
.dot{width:27px;height:27px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.71rem;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer;transition:all .14s;border:1px solid var(--border);background:var(--card2);color:var(--muted)}
.dot.dot-done{background:rgba(0,229,192,.16);color:#00e5c0;border-color:rgba(0,229,192,.3)}
.dot.dot-wrong{background:rgba(255,107,157,.12);color:#ff8fab;border-color:rgba(255,107,157,.25)}
.dot.dot-timeout{background:rgba(255,160,50,.1);color:#ffb347;border-color:rgba(255,160,50,.25)}
.dot.dot-cur{background:var(--accent);color:#fff;border-color:var(--accent)}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(7,7,15,.82);z-index:100;display:flex;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(3px);animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2rem 1.8rem;max-width:380px;width:100%;text-align:center;animation:popUp .25s ease}
@keyframes popUp{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
.modal-icon{font-size:2.4rem;margin-bottom:.8rem}
.modal-title{font-size:1.15rem;font-weight:700;font-family:'Syne',sans-serif;margin-bottom:.5rem}
.modal-sub{font-size:.86rem;color:var(--muted);line-height:1.6;margin-bottom:1.5rem}
.modal-btns{display:flex;gap:.7rem;justify-content:center}
.btn-modal-cancel{padding:.65rem 1.4rem;background:var(--card2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:.88rem;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .16s}
.btn-modal-cancel:hover{background:rgba(124,92,252,.1);border-color:var(--accent)}
.btn-modal-quit{padding:.65rem 1.4rem;background:rgba(255,107,157,.15);border:1px solid rgba(255,107,157,.35);border-radius:10px;color:#ff8fab;font-size:.88rem;font-family:'Syne',sans-serif;font-weight:600;cursor:pointer;transition:all .16s}
.btn-modal-quit:hover{background:rgba(255,107,157,.28)}
/* RESULTS */
.result-hero{background:var(--card);border:1px solid var(--border);border-radius:22px;padding:2.1rem 1.8rem;text-align:center;margin-bottom:.85rem;position:relative;overflow:hidden}
.result-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(124,92,252,.11) 0%,transparent 65%);pointer-events:none}
.badge-circle{width:90px;height:90px;border-radius:50%;margin:0 auto 1rem;display:flex;align-items:center;justify-content:center;font-size:2.5rem;animation:popIn .5s .1s both}
@keyframes popIn{from{transform:scale(0) rotate(-20deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
.tier-novice{background:linear-gradient(135deg,#0e3040,#0a5060);box-shadow:0 0 32px rgba(0,229,192,.2)}
.tier-explorer{background:linear-gradient(135deg,#14143a,#271550);box-shadow:0 0 32px rgba(124,92,252,.26)}
.tier-practitioner{background:linear-gradient(135deg,#270a38,#50186a);box-shadow:0 0 32px rgba(180,92,252,.28)}
.tier-strategist{background:linear-gradient(135deg,#380818,#6a1838);box-shadow:0 0 32px rgba(255,107,157,.32)}
.result-tier-name{font-size:1.45rem;font-weight:800;font-family:'Syne',sans-serif;margin-bottom:.28rem}
.result-sub{font-size:.86rem;color:var(--muted);margin-bottom:1.3rem}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem}
.stat-box{background:#0b0b1a;border-radius:12px;padding:.85rem;text-align:center;border:1px solid var(--border)}
.stat-val{font-size:1.25rem;font-weight:700;font-family:'Syne',sans-serif}
.stat-lbl{font-size:.7rem;color:var(--muted);margin-top:.18rem}
.best-streak-chip{display:inline-flex;align-items:center;gap:.4rem;padding:.4rem 1rem;border-radius:100px;background:rgba(255,209,102,.1);color:#ffd166;border:1px solid rgba(255,209,102,.28);font-size:.8rem;font-weight:600;margin-top:.9rem}
/* TABS */
.tabs{display:flex;gap:.38rem;background:#0b0b1a;padding:.26rem;border-radius:11px;margin-bottom:.9rem}
.tab{flex:1;padding:.5rem;border:none;background:transparent;color:var(--muted);font-family:'Syne',sans-serif;font-size:.78rem;font-weight:700;border-radius:8px;cursor:pointer;transition:all .16s;white-space:nowrap}
.tab.active{background:var(--accent);color:#fff}
.sec-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:1.35rem;margin-bottom:.85rem}
.sec-hd{font-size:.9rem;font-weight:700;font-family:'Syne',sans-serif;margin-bottom:.85rem;display:flex;align-items:center;gap:.4rem}
.ri{padding:.82rem;border-radius:10px;margin-bottom:.42rem;border:1px solid}
.ri-ok{background:rgba(0,229,192,.05);border-color:rgba(0,229,192,.18)}
.ri-no{background:rgba(255,107,157,.05);border-color:rgba(255,107,157,.18)}
.ri-sk{background:rgba(255,209,102,.04);border-color:rgba(255,209,102,.16)}
.ri-to{background:rgba(255,160,50,.04);border-color:rgba(255,160,50,.18)}
.ri-q{font-size:.84rem;font-weight:500;margin-bottom:.28rem;line-height:1.5}
.ri-meta{font-size:.76rem;color:var(--muted)}
.ri-exp{font-size:.77rem;color:#9896c8;margin-top:.3rem;font-style:italic;line-height:1.5}
.lp-item{display:flex;gap:.85rem;padding:.82rem;background:#0b0b1a;border-radius:11px;margin-bottom:.42rem;align-items:flex-start;border:1px solid var(--border)}
.lp-icon{width:35px;height:35px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:.95rem;flex-shrink:0;background:rgba(124,92,252,.13)}
.lp-title{font-size:.86rem;font-weight:600;margin-bottom:.16rem}
.lp-desc{font-size:.76rem;color:var(--muted);line-height:1.5}
.lb-row{display:flex;align-items:center;gap:.6rem;padding:.68rem .82rem;border-radius:10px;margin-bottom:.32rem;border:1px solid transparent}
.lb-cur{background:rgba(124,92,252,.09);border-color:rgba(124,92,252,.26)}
.lb-rank{width:25px;text-align:center;font-size:.8rem;font-weight:700;font-family:'Syne',sans-serif;color:var(--muted);flex-shrink:0}
.lb-name{flex:1;font-size:.86rem;font-weight:500}
.lb-you{font-size:.66rem;color:var(--accent);margin-left:.32rem}
.lb-pct{font-size:.88rem;font-weight:700;font-family:'Syne',sans-serif;color:var(--accent)}
.lb-time{font-size:.73rem;color:var(--muted)}
.lb-tier-badge{font-size:.66rem;padding:.18rem .52rem;border-radius:100px}
.action-row{display:flex;gap:.6rem;flex-wrap:wrap;margin-top:.25rem}
.action-row .btn-primary{margin-top:0;flex:1;min-width:120px}
/* CONFETTI */
.cf-wrap{position:fixed;inset:0;pointer-events:none;z-index:999;overflow:hidden}
.cf{position:absolute;top:-12px;animation:cfFall linear forwards}
@keyframes cfFall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>
<div id="root"></div>
<script>
const QUESTION_BANK=[
  {id:1,text:"What does 'AI' stand for?",opts:["Automated Interface","Artificial Intelligence","Augmented Interaction","Analytical Integration"],correct:1,cat:"Fundamentals",diff:"beginner",exp:"Artificial Intelligence refers to computer systems designed to perform tasks that typically require human-like intelligence."},
  {id:2,text:"What does 'ML' stand for in technology?",opts:["Machine Logic","Machine Learning","Modular Language","Meta Layer"],correct:1,cat:"Fundamentals",diff:"beginner",exp:"Machine Learning is a subset of AI where systems learn patterns from data without being explicitly programmed for every task."},
  {id:3,text:"What is 'training data' in machine learning?",opts:["Data used to test the final model","Data the model learns patterns from","Encrypted data","Data created by the AI itself"],correct:1,cat:"Fundamentals",diff:"beginner",exp:"Training data is the labelled dataset used to teach an ML model to recognise patterns and make predictions."},
  {id:4,text:"Which of these is an example of AI in everyday life?",opts:["A printed book","A voice assistant like Siri or Alexa","A standard calculator","A light switch"],correct:1,cat:"Real-World AI",diff:"beginner",exp:"Voice assistants use NLP and ML to understand spoken language and respond intelligently — a classic everyday AI application."},
  {id:5,text:"What does 'supervised learning' mean?",opts:["Learning with a human teacher present","Training on labelled input-output pairs","Learning without any data","Learning by watching videos"],correct:1,cat:"Fundamentals",diff:"beginner",exp:"In supervised learning, models are trained on examples where both inputs and correct outputs are provided."},
  {id:6,text:"What is computer vision primarily used for?",opts:["Processing audio signals","Enabling machines to interpret visual data","Managing databases","Text summarisation"],correct:1,cat:"Real-World AI",diff:"beginner",exp:"Computer vision enables machines to analyse images and video — powering medical imaging, autonomous vehicles, and face detection."},
  {id:7,text:"What is a Large Language Model (LLM)?",opts:["A very large dictionary","An AI trained on vast text to understand and generate language","Translation software","A language database"],correct:1,cat:"LLMs",diff:"beginner",exp:"LLMs like GPT and Claude are trained on massive text corpora and can generate, summarise, translate, and reason about language."},
  {id:8,text:"What does 'bias' mean in AI ethics?",opts:["The model's tendency to be dishonest","Unfair outcomes due to skewed data or design","A type of activation function","A weight in a neural network"],correct:1,cat:"Ethics & Bias",diff:"beginner",exp:"AI bias occurs when a model produces systematically unfair results, often because training data reflects historical inequalities."},
  {id:9,text:"Which best describes a neural network?",opts:["A network of physical computers","A system inspired by the human brain with interconnected nodes","A type of database","A programming language"],correct:1,cat:"Neural Networks",diff:"beginner",exp:"Neural networks are computational models inspired by biological neurons, using layers of interconnected nodes to process information."},
  {id:10,text:"Which application uses Natural Language Processing most directly?",opts:["Self-driving cars","Spam email filtering","Image compression","Facial recognition"],correct:1,cat:"Real-World AI",diff:"beginner",exp:"NLP powers spam filters by analysing email text patterns to distinguish legitimate messages from junk."},
  {id:11,text:"What is 'unsupervised learning'?",opts:["Training with labelled data","Finding hidden patterns in data without labels","Learning from human feedback","Training with reinforcement rewards"],correct:1,cat:"Fundamentals",diff:"beginner",exp:"Unsupervised learning discovers structure in unlabelled data — clustering similar items without being told what to look for."},
  {id:12,text:"What is a chatbot?",opts:["A physical robot that talks","A software program that simulates conversation","A type of computer virus","A hardware component"],correct:1,cat:"Real-World AI",diff:"beginner",exp:"Chatbots are software applications that simulate human conversation via text or voice, now often powered by LLMs."},
  {id:13,text:"What does 'algorithm' mean in computing?",opts:["A type of computer chip","A step-by-step set of instructions for solving a problem","A programming language","A database structure"],correct:1,cat:"Fundamentals",diff:"beginner",exp:"An algorithm is a defined sequence of steps that a computer follows to solve a problem or complete a task."},
  {id:14,text:"What is a recommendation system?",opts:["A system that recommends hardware upgrades","An AI that suggests content based on user preferences","A human advisor system","A search engine"],correct:1,cat:"Real-World AI",diff:"beginner",exp:"Recommendation systems (used by Netflix, Spotify, Amazon) analyse user behaviour to suggest relevant content or products."},
  {id:15,text:"Which describes 'deep learning'?",opts:["Learning that takes a long time","ML using multi-layered neural networks to learn complex patterns","Learning from very deep databases","Memorising large datasets"],correct:1,cat:"Neural Networks",diff:"beginner",exp:"Deep learning uses neural networks with many layers to automatically learn hierarchical representations from data."},
  {id:16,text:"What is the main purpose of a search engine?",opts:["Store files online","Retrieve and rank relevant web pages for a query","Send emails","Run applications"],correct:1,cat:"Real-World AI",diff:"beginner",exp:"Modern search engines use AI and ML to rank billions of web pages and surface the most relevant results for each query."},
  {id:17,text:"What does a self-driving car primarily rely on?",opts:["Only GPS","A combination of sensors, computer vision, and AI decision-making","Manual remote control","Pre-programmed fixed routes"],correct:1,cat:"Real-World AI",diff:"beginner",exp:"Autonomous vehicles combine LIDAR, cameras, radar, and AI systems to perceive the environment and make real-time driving decisions."},
  {id:18,text:"What is 'generative AI'?",opts:["AI that generates revenue","AI systems capable of creating new content from learned patterns","AI that only classifies data","AI used in manufacturing"],correct:1,cat:"Fundamentals",diff:"beginner",exp:"Generative AI (ChatGPT, DALL-E, Stable Diffusion) creates novel outputs by learning statistical patterns from vast training data."},
  {id:19,text:"What is the Turing Test?",opts:["A test of computer processing speed","A benchmark where an AI must converse indistinguishably from a human","A measure of neural network depth","A standard GPU benchmark"],correct:1,cat:"Fundamentals",diff:"beginner",exp:"Proposed by Alan Turing in 1950, the Turing Test evaluates whether an AI can exhibit intelligent behaviour indistinguishable from a human."},
  {id:20,text:"What is 'AI for social good'?",opts:["AI used only by non-profits","Applying AI to address societal challenges like healthcare and education","AI that avoids commercial use","AI designed by social scientists"],correct:1,cat:"Real-World AI",diff:"beginner",exp:"AI for social good applies AI capabilities to high-impact challenges — from diagnosing rare diseases to personalising education for underserved communities."},
  {id:21,text:"What is 'overfitting' in machine learning?",opts:["Training on too many computers","When a model memorises training data but fails on new data","When the model runs out of memory","When training takes too long"],correct:1,cat:"ML Concepts",diff:"intermediate",exp:"Overfitting happens when a model learns training data too precisely including noise, causing poor generalisation to unseen examples."},
  {id:22,text:"What is 'hallucination' in LLMs?",opts:["A visual AI art technique","When the model confidently generates false information","A creativity feature","When the model refuses to answer"],correct:1,cat:"LLMs",diff:"intermediate",exp:"Hallucination refers to AI generating plausible-sounding but factually incorrect content — a key reliability challenge in deployed LLMs."},
  {id:23,text:"What is a 'transformer' in modern AI?",opts:["A component that converts voltage","An attention-based architecture underpinning most modern LLMs","A data preprocessing step","A type of regularisation"],correct:1,cat:"Neural Networks",diff:"intermediate",exp:"The Transformer architecture uses self-attention and is the foundation for GPT, BERT, and similar models."},
  {id:24,text:"What does 'reinforcement learning' involve?",opts:["Rewarding an agent for correct actions in an environment","Learning from labelled datasets","Copying human behaviour directly","Learning by reading text"],correct:0,cat:"ML Concepts",diff:"intermediate",exp:"In RL, an agent learns by interacting with an environment, receiving rewards for good actions and penalties for bad ones."},
  {id:25,text:"What is 'prompt engineering'?",opts:["Building new AI hardware","Designing inputs to elicit optimal AI outputs","A method of training neural networks","A new programming language"],correct:1,cat:"LLMs",diff:"intermediate",exp:"Prompt engineering is crafting effective inputs to guide LLM behaviour — crucial for reliable and useful responses."},
  {id:26,text:"What is fine-tuning in LLMs?",opts:["Adjusting hardware settings","Adapting a pre-trained model to a specific domain using targeted data","Deleting unused parameters","Running the model faster"],correct:1,cat:"LLMs",diff:"intermediate",exp:"Fine-tuning adapts a pre-trained model to a specific domain using a smaller dataset, saving massive compute compared to training from scratch."},
  {id:27,text:"What role does a 'loss function' play in ML training?",opts:["It defines the model architecture","It measures how far predictions are from correct answers, guiding weight updates","It stores training data","It controls learning rate"],correct:1,cat:"ML Concepts",diff:"intermediate",exp:"The loss function quantifies prediction error. During training, the optimiser adjusts weights to minimise this loss via backpropagation."},
  {id:28,text:"What is a 'confusion matrix'?",opts:["How confused a model is during training","A table measuring classification model performance across true/false positive/negative outcomes","The complexity of a neural network","Memory usage during inference"],correct:1,cat:"ML Concepts",diff:"intermediate",exp:"A confusion matrix shows TP, TN, FP, FN outcomes for classifiers, enabling calculation of precision, recall, and F1-score."},
  {id:29,text:"Which of these is an unethical AI application?",opts:["Using AI to detect cancer in scans","Using facial recognition to profile people by ethnicity","Recommending movies by viewing history","Automating spam filtering"],correct:1,cat:"Ethics & Bias",diff:"intermediate",exp:"Using AI to profile people based on protected characteristics like ethnicity raises serious discrimination and civil liberties concerns."},
  {id:30,text:"What is a 'decision tree' in ML?",opts:["A chart of model decisions over time","A flowchart-like model that splits data on feature conditions to make predictions","A type of neural network layer","A visualisation of training loss"],correct:1,cat:"ML Concepts",diff:"intermediate",exp:"Decision trees recursively split data based on feature thresholds, creating interpretable if-then rules for classification or regression."},
  {id:31,text:"What is 'tokenisation' in NLP?",opts:["Encrypting text data","Breaking text into smaller units (tokens) for model processing","Compressing language models","Translating between languages"],correct:1,cat:"LLMs",diff:"intermediate",exp:"Tokenisation splits text into tokens that models process numerically — a fundamental NLP preprocessing step."},
  {id:32,text:"What is 'transfer learning'?",opts:["Moving a model between computers","Applying knowledge from one trained model to a different but related task","Transferring data between databases","Moving weights to a new architecture"],correct:1,cat:"ML Concepts",diff:"intermediate",exp:"Transfer learning leverages representations learned on one task and adapts them for another, reducing data and compute needs."},
  {id:33,text:"What is an 'epoch' in ML training?",opts:["A type of neural network layer","One complete pass through the entire training dataset","A measure of model accuracy","A hyperparameter tuning technique"],correct:1,cat:"ML Concepts",diff:"intermediate",exp:"An epoch represents one full training cycle through all training examples. Models typically train for multiple epochs to converge."},
  {id:34,text:"What does 'precision' measure in a classification model?",opts:["How fast the model runs","The proportion of positive predictions that were actually correct","How much memory the model uses","The model's training speed"],correct:1,cat:"ML Concepts",diff:"intermediate",exp:"Precision = TP / (TP + FP). It measures how many of the model's positive predictions were genuinely positive."},
  {id:35,text:"What is 'data augmentation'?",opts:["Adding more servers","Artificially expanding training data by creating modified versions of existing examples","Cleaning corrupt data","Encrypting training datasets"],correct:1,cat:"ML Concepts",diff:"intermediate",exp:"Data augmentation artificially grows training sets (flipping images, adding noise), improving model robustness and reducing overfitting."},
  {id:36,text:"What is 'explainability' in AI?",opts:["Making AI run faster","The ability to understand and interpret why a model made a specific prediction","Making AI models smaller","Documenting AI training data"],correct:1,cat:"Ethics & Bias",diff:"intermediate",exp:"AI explainability (XAI) refers to methods that help humans understand model decisions — critical for trust and regulatory compliance."},
  {id:37,text:"What is a GAN (Generative Adversarial Network)?",opts:["A network that detects malware","Two neural networks competing to produce realistic synthetic data","A type of search algorithm","A reinforcement learning framework"],correct:1,cat:"Neural Networks",diff:"intermediate",exp:"GANs pit a generator (creates fake data) against a discriminator (detects fakes), producing highly realistic images, audio, and text."},
  {id:38,text:"What is 'regularisation' in machine learning?",opts:["Standardising input data","Techniques that penalise model complexity to prevent overfitting","Speeding up training","Normalising output predictions"],correct:1,cat:"ML Concepts",diff:"intermediate",exp:"Regularisation (L1, L2, dropout) adds penalty terms to the loss function, discouraging models from becoming too complex."},
  {id:39,text:"What is an 'embedding' in ML?",opts:["A security feature","A dense numerical vector representation of data in a continuous space","A type of activation function","A model compression technique"],correct:1,cat:"Neural Networks",diff:"intermediate",exp:"Embeddings map high-dimensional data into dense vector spaces where semantic similarity is captured geometrically — foundational to modern NLP."},
  {id:40,text:"What is 'AI governance'?",opts:["Managing AI server infrastructure","Policies and frameworks that guide responsible AI development and deployment","Governing access to AI tools","Training AI on government data"],correct:1,cat:"Ethics & Bias",diff:"intermediate",exp:"AI governance encompasses laws, standards, and policies that ensure AI systems are safe, fair, transparent, and accountable."},
  {id:41,text:"What does 'RLHF' stand for and why does it matter?",opts:["Recursive Learning via Human Feedback","Reinforcement Learning from Human Feedback — aligns models with human values","Randomised Learning with High Frequency","Relational Logic for Hybrid Functions"],correct:1,cat:"LLMs",diff:"advanced",exp:"RLHF trains models using human raters to score outputs, reinforcing preferred behaviours — central to making models like ChatGPT and Claude safer."},
  {id:42,text:"What is the 'alignment problem' in AI safety?",opts:["Making AI code run efficiently","Ensuring AI systems pursue goals consistent with human intentions and values","Aligning training data with test data","Synchronising multiple AI servers"],correct:1,cat:"AI Safety",diff:"advanced",exp:"The alignment problem asks: how do we ensure increasingly capable AI systems reliably pursue goals that are genuinely beneficial to humans?"},
  {id:43,text:"What distinguishes a generative model from a discriminative one?",opts:["Generative models classify; discriminative models create","Generative models learn data distributions to create new samples; discriminative models learn decision boundaries","They are the same","Discriminative models are always more accurate"],correct:1,cat:"ML Concepts",diff:"advanced",exp:"Generative models (GANs, VAEs, diffusion) learn P(X) and synthesise new data. Discriminative models learn P(Y|X) to classify or predict."},
  {id:44,text:"What is 'emergent behaviour' in large AI models?",opts:["Planned features added during training","Unexpected capabilities arising from scale not present in smaller models","Models breaking unexpectedly","Behaviour caused by bugs"],correct:1,cat:"AI Safety",diff:"advanced",exp:"As models scale, they exhibit emergent capabilities — e.g. complex reasoning — not present in smaller versions."},
  {id:45,text:"What is 'federated learning'?",opts:["Training one huge centralised model","Training across decentralised devices without sharing raw data, preserving privacy","A technique for combining multiple models","A distributed database system"],correct:1,cat:"AI Safety",diff:"advanced",exp:"Federated learning trains models on-device, sending only model updates — not raw data — enabling privacy-preserving AI at scale."},
  {id:46,text:"What is 'attention mechanism' in transformers?",opts:["A way to speed up GPU processing","A mechanism allowing models to weigh the importance of different input tokens when generating output","A method to compress model weights","A type of dropout regularisation"],correct:1,cat:"Neural Networks",diff:"advanced",exp:"Attention allows each token to attend to all other tokens in context, learning which relationships matter — the key transformer innovation."},
  {id:47,text:"What is a 'foundation model'?",opts:["The first model ever trained","A large model pre-trained on broad data and adapted for many downstream tasks","A model with the most parameters","The base architecture before adding layers"],correct:1,cat:"LLMs",diff:"advanced",exp:"Foundation models (GPT-4, Claude, Gemini) are trained on vast general data and serve as bases for fine-tuning across specialised applications."},
  {id:48,text:"What is 'catastrophic forgetting' in neural networks?",opts:["When a GPU overheats","When a model loses previously learned knowledge upon training on new data","When training loss suddenly spikes","When a model fails to converge"],correct:1,cat:"Neural Networks",diff:"advanced",exp:"Catastrophic forgetting occurs when a neural network trained on new tasks overwrites weights encoding old knowledge — a challenge in continual learning."},
  {id:49,text:"What is 'model distillation'?",opts:["Removing toxic outputs","Training a smaller 'student' model to mimic a larger 'teacher' model's behaviour","A data cleaning technique","Compressing training data"],correct:1,cat:"ML Concepts",diff:"advanced",exp:"Knowledge distillation trains compact student models to replicate larger teacher model outputs at lower compute cost."},
  {id:50,text:"What is the 'capability-safety gap' in AI?",opts:["The difference between AI speed and accuracy","The concern that AI capabilities are advancing faster than our ability to ensure they remain safe","The gap between consumer and enterprise AI","The difference in performance between model versions"],correct:1,cat:"AI Safety",diff:"advanced",exp:"The capability-safety gap describes the risk that as AI systems become more powerful, safety and alignment techniques lag behind."},
  {id:51,text:"What is 'constitutional AI'?",opts:["AI that follows government laws","A training technique where AI is guided by principles to self-critique and revise harmful outputs","AI built for legal applications","A type of rule-based expert system"],correct:1,cat:"AI Safety",diff:"advanced",exp:"Constitutional AI (developed by Anthropic) trains models to evaluate their own outputs against a set of principles."},
  {id:52,text:"What is 'chain-of-thought prompting'?",opts:["Linking multiple LLMs together","Prompting an LLM to show reasoning steps before giving a final answer","A technique for faster inference","A method for multi-modal AI"],correct:1,cat:"LLMs",diff:"advanced",exp:"Chain-of-thought prompting encourages LLMs to reason step-by-step, improving performance on arithmetic, logic, and multi-step tasks."},
  {id:53,text:"What is 'retrieval-augmented generation' (RAG)?",opts:["A way to speed up model training","A technique combining LLM generation with real-time retrieval from external knowledge bases","A type of reinforcement learning","A data augmentation method"],correct:1,cat:"LLMs",diff:"advanced",exp:"RAG grounds LLM responses by retrieving relevant documents at inference time, reducing hallucinations and enabling up-to-date knowledge without retraining."},
  {id:54,text:"What is an 'adversarial attack' on an AI model?",opts:["Competitive benchmarking between models","Deliberately crafting inputs to fool a model into making incorrect predictions","Hacking a model's training server","Stealing a model's weights"],correct:1,cat:"AI Safety",diff:"advanced",exp:"Adversarial attacks add imperceptible perturbations to inputs that cause models to misclassify with high confidence."},
  {id:55,text:"What is 'multi-modal AI'?",opts:["AI that runs on multiple computers","AI systems that can process and generate multiple types of data (text, images, audio, video)","AI with multiple training objectives","AI supporting multiple languages"],correct:1,cat:"Real-World AI",diff:"advanced",exp:"Multi-modal models (GPT-4V, Gemini, Claude) integrate different data modalities, enabling richer tasks like image captioning and visual Q&A."},
  {id:56,text:"What does 'context window' mean for LLMs?",opts:["The user interface of a chatbot","The maximum amount of text an LLM can process in a single interaction","The training dataset size","The model's memory between sessions"],correct:1,cat:"LLMs",diff:"intermediate",exp:"The context window defines how much text a model can see at once. Larger windows enable processing longer documents."},
  {id:57,text:"What is 'zero-shot learning'?",opts:["Training a model with no data","A model performing a task it was never explicitly trained on, using only a description","A model with zero errors","Training without a GPU"],correct:1,cat:"ML Concepts",diff:"advanced",exp:"Zero-shot learning enables models to generalise to completely new tasks using natural language descriptions alone."},
  {id:58,text:"What is 'synthetic data' in AI?",opts:["Data created by humans manually","Artificially generated data that mimics real-world distributions, used when real data is scarce","Corrupted real-world data","Data extracted from social media"],correct:1,cat:"ML Concepts",diff:"intermediate",exp:"Synthetic data enables training when real data is expensive, rare, or privacy-sensitive — widely used in healthcare and autonomous driving."},
  {id:59,text:"What is the 'black box' problem in AI?",opts:["A hardware failure in AI servers","The inability to understand or explain why a complex model produces a specific output","A type of data encryption","An AI training technique"],correct:1,cat:"Ethics & Bias",diff:"intermediate",exp:"Black box models achieve high accuracy but their internal decision processes are opaque, making it hard to explain or audit their outputs."},
  {id:60,text:"What is 'bias-variance tradeoff' in ML?",opts:["Choosing between speed and accuracy","The tension between a model being too simple (high bias) or too complex (high variance)","Balancing training and test data","Choosing between precision and recall"],correct:1,cat:"ML Concepts",diff:"advanced",exp:"Simple models underfit (high bias), complex models overfit (high variance). Optimal models balance both for best generalisation."},
  {id:61,text:"What is 'AI winter'?",opts:["Cold weather affecting server performance","Historical periods of reduced AI funding and progress due to unmet expectations","A seasonal slowdown in AI research","A type of model freezing technique"],correct:1,cat:"Fundamentals",diff:"intermediate",exp:"AI winters (1970s, late 1980s) were periods when AI funding dried up after hype exceeded results."},
  {id:62,text:"What is 'differential privacy' in AI?",opts:["A method to make models run on different hardware","A mathematical framework adding noise to data to protect individual privacy while preserving statistical patterns","A technique for training on proprietary data","A privacy policy standard"],correct:1,cat:"AI Safety",diff:"advanced",exp:"Differential privacy adds calibrated noise to outputs or training, providing formal guarantees that individual data points cannot be extracted."},
  {id:63,text:"What is 'A/B testing' in AI product development?",opts:["Testing models on two types of hardware","Comparing two versions of a model or feature with real users to determine which performs better","Alternating between bias and variance","Testing AI in both supervised and unsupervised modes"],correct:1,cat:"Real-World AI",diff:"intermediate",exp:"A/B testing exposes different user groups to different model versions, measuring outcomes to make data-driven product decisions."},
  {id:64,text:"What is 'batch size' in ML training?",opts:["The total size of the training dataset","The number of training examples processed in one gradient update step","The size of the model's output","The number of training epochs"],correct:1,cat:"ML Concepts",diff:"intermediate",exp:"Batch size controls how many examples are fed through the network before updating weights."},
  {id:65,text:"What is 'AI regulation' and why is it growing?",opts:["Technical standards for AI hardware","Government rules and laws governing how AI systems can be developed, deployed, and used","Corporate policies about AI usage","Academic guidelines for AI research"],correct:1,cat:"Ethics & Bias",diff:"intermediate",exp:"AI regulation (EU AI Act, US EO on AI) is growing as governments respond to risks from bias, misinformation, surveillance, and safety."},
  {id:66,text:"What is 'data poisoning' in ML security?",opts:["Corrupting a model's output layer","Maliciously manipulating training data to cause a model to learn incorrect or harmful patterns","Overloading a model with too much data","Encrypting model weights"],correct:1,cat:"AI Safety",diff:"advanced",exp:"Data poisoning attacks inject malicious examples into training sets to cause models to malfunction — a significant production threat."},
  {id:67,text:"What is 'edge AI'?",opts:["AI used only in edge computing research","Running AI inference on local devices (phones, sensors) rather than in the cloud","AI at the boundaries of human knowledge","AI deployed at network edges for routing"],correct:1,cat:"Real-World AI",diff:"intermediate",exp:"Edge AI runs models on-device, enabling real-time inference without cloud latency, reducing bandwidth use, and improving privacy."},
  {id:68,text:"What is 'model collapse' in generative AI?",opts:["A model crashing during inference","When a generative model trained on AI-generated data progressively loses diversity and quality","A gradual performance drop over time","When training loss plateaus"],correct:1,cat:"AI Safety",diff:"advanced",exp:"Model collapse describes how iteratively training on AI-generated outputs causes models to lose variability, converging toward homogeneous outputs."},
  {id:69,text:"What is 'precision agriculture' using AI?",opts:["Farming with very accurate tools","Using AI and sensor data to optimise crop yields and reduce resource waste","A type of robotic planting system","GPS-guided tractors only"],correct:1,cat:"Real-World AI",diff:"intermediate",exp:"Precision agriculture uses AI, IoT sensors, and satellite imagery to monitor soil health, predict yields, and optimise resource use."},
  {id:70,text:"What is 'neural architecture search' (NAS)?",opts:["Searching the internet with AI","Using AI to automatically design optimal neural network architectures for a task","A method to search within large models","Analysing network traffic with AI"],correct:1,cat:"Neural Networks",diff:"advanced",exp:"NAS automates the design of neural network architectures using search algorithms or RL — reducing the need for manual engineering."},
  {id:71,text:"What is 'AI safety research'?",opts:["Research into AI hardware reliability","The field studying how to build AI systems that remain safe and aligned with human values","Research into AI cybersecurity","Studying AI's environmental impact"],correct:1,cat:"AI Safety",diff:"intermediate",exp:"AI safety research (at Anthropic, DeepMind, OpenAI) develops techniques to ensure AI systems behave as intended and remain human-aligned."},
  {id:72,text:"What is a 'knowledge graph' in AI?",opts:["A chart of AI knowledge over time","A structured network of entities and relationships used to enhance AI reasoning","A neural network visualisation tool","A type of unsupervised clustering"],correct:1,cat:"Real-World AI",diff:"advanced",exp:"Knowledge graphs represent facts as entity-relationship triples, helping AI systems reason about the world beyond pure statistical pattern matching."},
  {id:73,text:"What is 'natural language generation' (NLG)?",opts:["Analysing text for sentiment","AI producing human-like text from structured data or prompts","Converting speech to text","Classifying document types"],correct:1,cat:"LLMs",diff:"intermediate",exp:"NLG is the AI capability to generate coherent, contextually relevant text — the core function behind LLMs like GPT and Claude."},
  {id:74,text:"What is the 'AI consciousness' debate about?",opts:["Whether AI systems consume too much energy","Whether AI systems can have subjective experiences comparable to humans","Whether AI can pass university exams","Whether AI can replace human jobs"],correct:1,cat:"Fundamentals",diff:"advanced",exp:"The AI consciousness debate explores whether advanced AI systems might have genuine subjective experiences — a profound philosophical question with major ethical implications."},
  {id:75,text:"What is 'active learning' in ML?",opts:["Training a model while it is deployed","A strategy where the model identifies which data points would be most valuable to label next","Learning from user interactions only","Training with no initial data"],correct:1,cat:"ML Concepts",diff:"intermediate",exp:"Active learning lets models query for labels on the most informative examples, reducing labelling costs while maintaining high performance."},
];

const COUNTDOWN_SECS=20;
const getTier=p=>TIERS.find(t=>p>=t.min&&p<=t.max)||TIERS[0];
const fmtTime=s=>{const m=Math.floor(s/60);const sc=s%60;return m>0?`${m}m ${sc}s`:`${sc}s`};
const shuffle=a=>{const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b};

function buildGame(diff,count){
  const pool=diff==='mixed'?QUESTION_BANK:QUESTION_BANK.filter(q=>q.diff===diff);
  const picked=shuffle(pool).slice(0,Math.min(count,pool.length));
  return picked.map(q=>{
    const sh=shuffle(q.opts.map((o,i)=>({text:o,orig:i})));
    return{...q,opts:sh.map(o=>o.text),correct:sh.findIndex(o=>o.orig===q.correct)};
  });
}

function Particles(){
  const cols=["#7c5cfc","#ff6b9d","#00e5c0","#a78bfa","#ffd166"];
  const ps=Array.from({length:14},(_,i)=>({id:i,col:cols[i%cols.length],left:Math.random()*100,sz:Math.random()*5+3,dur:Math.random()*14+9,del:Math.random()*14}));
  return React.createElement('div',{className:'particles'},ps.map(p=>React.createElement('div',{key:p.id,className:'particle',style:{left:`${p.left}%`,width:p.sz,height:p.sz,background:p.col,animationDuration:`${p.dur}s`,animationDelay:`${p.del}s`}})));
}

function Confetti({on}){
  if(!on)return null;
  const cols=["#7c5cfc","#ff6b9d","#00e5c0","#ffd166","#a78bfa"];
  const ps=Array.from({length:55},(_,i)=>({id:i,col:cols[i%cols.length],left:Math.random()*100,dur:Math.random()*2+1.2,del:Math.random()*1.8,sz:Math.random()*9+4,round:Math.random()>.5}));
  return React.createElement('div',{className:'cf-wrap'},ps.map(p=>React.createElement('div',{key:p.id,className:'cf',style:{left:`${p.left}%`,background:p.col,width:p.sz,height:p.sz,animationDuration:`${p.dur}s`,animationDelay:`${p.del}s`,borderRadius:p.round?'50%':'2px'}})));
}

function Toast({msg,type,key}){
  if(!msg)return null;
  return React.createElement('div',{key,className:`feedback-toast toast-${type}`},msg);
}

function SplashScreen({onStart}){
  const [name,setName]=React.useState('');
  const [diff,setDiff]=React.useState('mixed');
  const [qCount,setQCount]=React.useState(10);
  const [nameErr,setNameErr]=React.useState(false);
  const [shaking,setShaking]=React.useState(false);
  const inputRef=React.useRef(null);
  const go=()=>{
    if(!name.trim()){setNameErr(true);setShaking(true);inputRef.current&&inputRef.current.focus();setTimeout(()=>setShaking(false),420);return;}
    onStart({name:name.trim(),diff,qCount});

  const qOpts=[5,10,15,20];
  const avail=diff==='mixed'?QUESTION_BANK.length:QUESTION_BANK.filter(q=>q.diff===diff).length;
  return React.createElement('div',{className:'screen'},
    React.createElement('div',{className:'card card-glow'},
      React.createElement('div',{className:'logo-wrap'},React.createElement('div',{className:'logo-ring'},'🤖')),
      React.createElement('h1',{className:'splash-title'},'AI Literacy Quest'),
      React.createElement('p',{className:'splash-sub'},'Test your AI knowledge across ML, ethics, LLMs & more. Earn your tier and get a personalised learning path.'),

      React.createElement('div',{style:{background:'rgba(124,92,252,.07)',border:'1px solid rgba(124,92,252,.2)',borderRadius:12,padding:'.7rem 1rem',marginBottom:'1.2rem',display:'flex',gap:'1.2rem',justifyContent:'center',flexWrap:'wrap'}},
        React.createElement('span',{style:{fontSize:'.78rem',color:'var(--muted)',display:'flex',alignItems:'center',gap:'.35rem'}},'⏱ 20s per question'),
        React.createElement('span',{style:{fontSize:'.78rem',color:'var(--muted)',display:'flex',alignItems:'center',gap:'.35rem'}},'💡 1 hint per game'),
        React.createElement('span',{style:{fontSize:'.78rem',color:'var(--muted)',display:'flex',alignItems:'center',gap:'.35rem'}},'🔥 Streak bonus'),
      ),
      React.createElement('div',{style:{marginBottom:'1rem'}},
        React.createElement('label',{className:'form-label'},'Your Name'),
        React.createElement('input',{ref:inputRef,className:`name-input${shaking?' shake':''}${nameErr&&!name.trim()?' err':''}`,placeholder:'Enter your name...',value:name,onChange:e=>{setName(e.target.value);if(e.target.value.trim())setNameErr(false)},onKeyDown:e=>e.key==='Enter'&&go()}),
        React.createElement('div',{className:'err-msg'},nameErr&&!name.trim()?'⚠ Please enter your name to begin.':'')
      ),
      React.createElement('div',{className:'setup-sec'},
        React.createElement('label',{className:'form-label'},'Difficulty'),
        React.createElement('div',{className:'chips'},diffs.map(o=>React.createElement('button',{key:o.v,className:`chip${diff===o.v?' ca':''}`,onClick:()=>setDiff(o.v)},o.l)))
      ),
      React.createElement('div',{className:'setup-sec'},
        React.createElement('label',{className:'form-label'},`Number of Questions — ${avail} available`),
        React.createElement('div',{className:'chips'},qOpts.map(n=>{const too=n>avail;return React.createElement('button',{key:n,className:`chip${qCount===n?' ct':''}`,onClick:()=>!too&&setQCount(n),style:{opacity:too?.35:1,cursor:too?'not-allowed':'pointer'}},`${n} Questions`)}))
      ),
      React.createElement('button',{className:'btn-primary',onClick:go},'Begin the Quest →')

}

function QuitModal({onConfirm,onCancel}){
  return React.createElement('div',{className:'modal-overlay',onClick:e=>{if(e.target===e.currentTarget)onCancel();}},

function QuizScreen({questions,onFinish,onQuit,playerName}){
  const [idx,setIdx]=React.useState(0);
  const [sels,setSels]=React.useState({});
  const [timedOut,setTimedOut]=React.useState({});
  const [eliminated,setEliminated]=React.useState({});
  const [hintUsed,setHintUsed]=React.useState(false);
  const [countdown,setCountdown]=React.useState(COUNTDOWN_SECS);
  const [totalTime,setTotalTime]=React.useState(0);
  const [qTimes,setQTimes]=React.useState({});
  const [qStart,setQStart]=React.useState(Date.now());
  const [showQuit,setShowQuit]=React.useState(false);
  const [toast,setToast]=React.useState(null);
  const [toastKey,setToastKey]=React.useState(0);
  const [cardShake,setCardShake]=React.useState(false);
  const totalRef=React.useRef(null);
  const cdRef=React.useRef(null);
  const advancePending=React.useRef(false);

  // total time
  React.useEffect(()=>{totalRef.current=setInterval(()=>setTotalTime(t=>t+1),1000);return()=>clearInterval(totalRef.current);},[]);

  const showToast=(msg,type)=>{setToast({msg,type});setToastKey(k=>k+1);setTimeout(()=>setToast(null),1600);};

  const advanceQuestion=React.useCallback((autoWrong)=>{
    if(advancePending.current)return;
    advancePending.current=true;
    const elapsed=Math.round((Date.now()-qStart)/1000);
    setQTimes(t=>({...t,[idx]:elapsed}));
    if(autoWrong){
      setTimedOut(t=>({...t,[idx]:true}));
      setCardShake(true);
      setTimeout(()=>setCardShake(false),500);
    }
    setTimeout(()=>{
      advancePending.current=false;
      if(idx<questions.length-1){setIdx(i=>i+1);}
    },autoWrong?900:0);
  },[idx,qStart,questions.length]);

  // countdown reset on question change
  React.useEffect(()=>{
    advancePending.current=false;
    setCountdown(COUNTDOWN_SECS);
    setQStart(Date.now());
    clearInterval(cdRef.current);
    cdRef.current=setInterval(()=>{
      setCountdown(c=>{
        if(c<=1){
          clearInterval(cdRef.current);
          advanceQuestion(true);
          return 0;
        }
        return c-1;
      });
    },1000);
    return()=>clearInterval(cdRef.current);
  },[idx]);

  const q=questions[idx];
  const chosen=sels[idx]??null;
  const isTimedOut=!!timedOut[idx];
  const eliminatedForQ=eliminated[idx]||[];
  const answeredCount=Object.keys(sels).length+Object.keys(timedOut).length;
  const dpMap={beginner:'dp-b',intermediate:'dp-i',advanced:'dp-a',mixed:'dp-m'};
  const letters=['A','B','C','D'];
  const cdPct=(countdown/COUNTDOWN_SECS)*100;
  const cdColor=countdown>10?'#00e5c0':countdown>5?'#ffd166':'#ff6b9d';
  const urgent=countdown<=5;

  const handleSelect=i=>{
    if(isTimedOut||eliminatedForQ.includes(i))return;
    clearInterval(cdRef.current);
    const elapsed=Math.round((Date.now()-qStart)/1000);
    setSels(s=>({...s,[idx]:i}));
    setQTimes(t=>({...t,[idx]:elapsed}));

  };

  const handleHint=()=>{
    if(hintUsed||isTimedOut||chosen!==null)return;
    const wrongOpts=q.opts.map((_,i)=>i).filter(i=>i!==q.correct&&!eliminatedForQ.includes(i));
    if(wrongOpts.length===0)return;
    const toElim=wrongOpts[Math.floor(Math.random()*wrongOpts.length)];
    setEliminated(e=>({...e,[idx]:[...(e[idx]||[]),toElim]}));
    setHintUsed(true);
    showToast('💡 One wrong answer removed!','correct');
  };

  const handleFinish=()=>{
    clearInterval(totalRef.current);clearInterval(cdRef.current);
    const answers=questions.map((qq,i)=>{
      const sel=sels[i]??null;
      const to=!!timedOut[i];
      return{questionId:qq.id,question:qq.text,options:qq.opts,selected:sel,correct:qq.correct,isCorrect:!to&&sel===qq.correct,timedOut:to,timeSpent:qTimes[i]??0,category:qq.cat,difficulty:qq.diff,explanation:qq.exp,correctText:qq.opts[qq.correct]};
    });
    let best=0,cur=0;
    answers.forEach(a=>{if(a.isCorrect){cur++;best=Math.max(best,cur);}else cur=0;});
    onFinish({answers,totalTime,playerName,bestStreak:best});
  };

  const handleQuitConfirm=()=>{clearInterval(totalRef.current);clearInterval(cdRef.current);onQuit();};

  const goTo=i=>{if(i>=0&&i<questions.length&&!advancePending.current)setIdx(i);};

  return React.createElement('div',{className:'screen'},
    toast&&React.createElement(Toast,{msg:toast.msg,type:toast.type,key:toastKey}),
    showQuit&&React.createElement(QuitModal,{onConfirm:handleQuitConfirm,onCancel:()=>setShowQuit(false)}),
    React.createElement('div',{className:'quiz-topbar'},
      React.createElement('span',{className:'q-counter'},`Q ${idx+1} / ${questions.length}`),
      React.createElement('div',{className:'topbar-right'},

        React.createElement('button',{className:`hint-btn ${hintUsed?'used':'available'}`,onClick:handleHint,title:hintUsed?'Hint already used':'Use hint to eliminate one wrong answer'},
          hintUsed?'💡 Used':'💡 Hint'
        ),
        React.createElement('span',{className:`diff-pill ${dpMap[q.diff]||'dp-m'}`},q.diff),
      )
    ),
    React.createElement('div',{className:'prog-bar'},React.createElement('div',{className:'prog-fill',style:{width:`${(idx/questions.length)*100}%`}})),
    React.createElement('div',{className:'countdown-wrap'},
      React.createElement('div',{className:'countdown-label'},
        React.createElement('span',{style:{fontSize:'.72rem',color:'var(--muted)'},fontFamily:'Syne'},'Time remaining'),
        React.createElement('span',{className:`countdown-num${urgent?' countdown-urgent':''}`,style:{color:cdColor}},`${countdown}s`)
      ),
      React.createElement('div',{className:'countdown-bar-bg'},
        React.createElement('div',{className:'countdown-bar-fill',style:{width:`${cdPct}%`,background:cdColor}})
      )
    ),
    React.createElement('div',{className:`q-card${cardShake?' timeout':''}`},
      React.createElement('div',{className:'q-cat'},q.cat),
      React.createElement('div',{className:'q-text'},q.text),
      React.createElement('div',{className:'opts-list'},
        q.opts.map((opt,i)=>{
          const isElim=eliminatedForQ.includes(i);
          let cls='opt-btn';
          if(isElim)cls+=' eliminated';
          else if(chosen===i)cls+=' chosen';
          return React.createElement('button',{key:i,className:cls,onClick:()=>handleSelect(i),disabled:isElim||isTimedOut},
            React.createElement('span',{className:'opt-letter'},letters[i]),opt
          );
        })
      )
    ),
    React.createElement('div',{className:'nav-row'},
      React.createElement('button',{className:'btn-nav',onClick:()=>goTo(idx-1),disabled:idx===0},'← Prev'),
      idx<questions.length-1
        ?React.createElement('button',{className:'btn-nav',onClick:()=>goTo(idx+1)},'Next →')
        :React.createElement('button',{className:'btn-finish',onClick:handleFinish},answeredCount<questions.length?`Finish (${answeredCount}/${questions.length})`:'Finish 🎉'),
      React.createElement('button',{className:'btn-quit',onClick:()=>setShowQuit(true)},'✕ Quit')
    ),
    React.createElement('div',{className:'dot-grid'},
      questions.map((_,i)=>{
        const isDone=sels[i]!==undefined;
        const isTO=!!timedOut[i];
        let cls='dot';
        if(i===idx)cls+=' dot-cur';
        else if(isTO)cls+=' dot-timeout';
        else if(isDone)cls+=' dot-done';
        return React.createElement('div',{key:i,className:cls,onClick:()=>goTo(i)},i+1);
      })
    )
  );
}

function ResultsScreen({result,leaderboard,onRestart}){
  const {answers,totalTime,playerName,bestStreak}=result;
  const correct=answers.filter(a=>a.isCorrect).length;
  const timedOutCount=answers.filter(a=>a.timedOut).length;
  const pct=Math.round((correct/answers.length)*100);
  const tier=getTier(pct);
  const answered=answers.filter(a=>a.selected!==null&&!a.timedOut);
  const avgTime=answered.length>0?Math.round(answered.reduce((s,a)=>s+a.timeSpent,0)/answered.length):0;
  const [tab,setTab]=React.useState('review');
  const weakCats=[...new Set(answers.filter(a=>!a.isCorrect&&!a.timedOut&&a.selected!==null).map(a=>a.category))];
  const lpItems=(weakCats.length>0?weakCats:Object.keys(LP_MAP).slice(0,3)).map(c=>LP_MAP[c]||{icon:'📖',title:c,desc:`Explore resources on ${c} to strengthen your understanding.`}).filter(Boolean);

  return React.createElement('div',{className:'screen'},
    React.createElement(Confetti,{on:pct>=60}),
    React.createElement('div',{className:'result-hero'},
      React.createElement('div',{className:`badge-circle ${tier.cls}`},tier.emoji),
      React.createElement('div',{className:'result-tier-name',style:{color:tier.color}},tier.name),
      React.createElement('div',{className:'result-sub'},`${playerName} · ${correct}/${answers.length} correct · ${fmtTime(totalTime)}`),
      React.createElement('div',{className:'stats-row'},
        React.createElement('div',{className:'stat-box'},React.createElement('div',{className:'stat-val',style:{color:tier.color}},`${pct}%`),React.createElement('div',{className:'stat-lbl'},'Score')),
        React.createElement('div',{className:'stat-box'},React.createElement('div',{className:'stat-val'},`${avgTime}s`),React.createElement('div',{className:'stat-lbl'},'Avg/Q')),
        React.createElement('div',{className:'stat-box'},React.createElement('div',{className:'stat-val'},timedOutCount>0?`${timedOutCount} ⏰`:'0 ⏰'),React.createElement('div',{className:'stat-lbl'},'Timed Out')),
      ),
      bestStreak>=2&&React.createElement('div',{className:'best-streak-chip'},`🔥 Best streak: ${bestStreak} in a row`)
    ),
    React.createElement('div',{className:'tabs'},
      [['review','📋 Review'],['path','🗺️ Learning Path'],['board','🏆 Leaderboard']].map(([v,l])=>
        React.createElement('button',{key:v,className:`tab${tab===v?' active':''}`,onClick:()=>setTab(v)},l)
      )
    ),
    tab==='review'&&React.createElement('div',{className:'sec-card'},
      React.createElement('div',{className:'sec-hd'},'📋 Answer Review'),
      answers.map((a,i)=>{
        const skipped=a.selected===null&&!a.timedOut;
        const cls=a.timedOut?'ri-to':a.isCorrect?'ri-ok':skipped?'ri-sk':'ri-no';
        return React.createElement('div',{key:i,className:`ri ${cls}`},
          React.createElement('div',{className:'ri-q'},`${i+1}. ${a.question}`),
          React.createElement('div',{className:'ri-meta'},
            a.timedOut?`⏰ Timed out · Correct: "${a.correctText}"`:
            skipped?'⏭ Skipped':
            a.isCorrect?`✅ Correct · ${a.timeSpent}s`:
            `❌ You chose: "${a.options[a.selected]}" · Correct: "${a.correctText}"`
          ),
          (a.timedOut||(!skipped&&!a.isCorrect))&&React.createElement('div',{className:'ri-exp'},`💡 ${a.explanation}`)
        );
      })
    ),
    tab==='path'&&React.createElement('div',{className:'sec-card'},
      React.createElement('div',{className:'sec-hd'},'🗺️ Your Personalised Learning Path'),
      weakCats.length>0?React.createElement('p',{style:{fontSize:'.8rem',color:'var(--muted)',marginBottom:'.85rem'}},`Focus areas: ${weakCats.join(', ')}`):React.createElement('p',{style:{fontSize:'.8rem',color:'var(--accent3)',marginBottom:'.85rem'}},'🌟 Excellent! Here are paths to go even further:'),
      lpItems.map((item,i)=>React.createElement('div',{key:i,className:'lp-item'},
        React.createElement('div',{className:'lp-icon'},item.icon),
        React.createElement('div',null,React.createElement('div',{className:'lp-title'},item.title),React.createElement('div',{className:'lp-desc'},item.desc))
      ))
    ),
    tab==='board'&&React.createElement('div',{className:'sec-card'},
      React.createElement('div',{className:'sec-hd'},'🏆 Leaderboard'),
      leaderboard.length===0?React.createElement('p',{style:{color:'var(--muted)',fontSize:'.86rem'}},"You're first on the board!"):
      leaderboard.map((e,i)=>{
        const t=getTier(e.pct);
        const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1;
        return React.createElement('div',{key:e.id,className:`lb-row${e.isCurrent?' lb-cur':''}`},
          React.createElement('div',{className:'lb-rank'},medal),
          React.createElement('div',{className:'lb-name'},e.playerName,e.isCurrent&&React.createElement('span',{className:'lb-you'},'(you)'),e.bestStreak>=3&&React.createElement('span',{style:{fontSize:'.68rem',color:'#ffd166',marginLeft:'.35rem'}},`🔥${e.bestStreak}`)),
          React.createElement('div',{style:{display:'flex',gap:'.5rem',alignItems:'center'}},
            React.createElement('span',{className:'lb-tier-badge',style:{background:`${t.color}1a`,color:t.color,border:`1px solid ${t.color}40`}},t.emoji),
            React.createElement('span',{className:'lb-pct'},`${e.pct}%`),
            React.createElement('span',{className:'lb-time'},fmtTime(e.totalTime))
          )
        );
      })
    ),
    React.createElement('div',{className:'action-row'},React.createElement('button',{className:'btn-primary',onClick:onRestart},'Play Again 🔄'))
  );
}

function App(){
  const [screen,setScreen]=React.useState('splash');
  const [questions,setQuestions]=React.useState([]);
  const [result,setResult]=React.useState(null);
  const [leaderboard,setLeaderboard]=React.useState([]);
  const [config,setConfig]=React.useState(null);
  const handleStart=cfg=>{setConfig(cfg);setQuestions(buildGame(cfg.diff,cfg.qCount));setScreen('quiz');};
  const handleFinish=res=>{
    const correct=res.answers.filter(a=>a.isCorrect).length;
    const pct=Math.round((correct/res.answers.length)*100);
    const entry={id:Date.now(),playerName:res.playerName,score:correct,total:res.answers.length,pct,totalTime:res.totalTime,bestStreak:res.bestStreak||0,isCurrent:true};
    const updated=[...leaderboard.map(e=>({...e,isCurrent:false})),entry].sort((a,b)=>b.pct-a.pct||a.totalTime-b.totalTime);
    setLeaderboard(updated);setResult(res);setScreen('results');
  };
  const goHome=()=>{setScreen('splash');setResult(null);setConfig(null);setQuestions([]);};
  return React.createElement('div',{className:'app'},
    React.createElement(Particles),
    screen==='splash'&&React.createElement(SplashScreen,{onStart:handleStart}),
    screen==='quiz'&&React.createElement(QuizScreen,{questions,onFinish:handleFinish,onQuit:goHome,playerName:config?.name||'Player'}),
    screen==='results'&&result&&React.createElement(ResultsScreen,{result,leaderboard,onRestart:goHome})
  );
}

const container=document.getElementById('root');
if(ReactDOM.createRoot){ReactDOM.createRoot(container).render(React.createElement(App));}
else{ReactDOM.render(React.createElement(App),container);}
</script>
